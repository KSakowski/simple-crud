services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_USE_POLLING=true
      - VITE_API_PROXY=http://backend:8080
    depends_on:
      - backend
